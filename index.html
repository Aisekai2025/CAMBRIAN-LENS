<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAMBRIAN-LENS: ETERNAL EXPLOSION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Consolas', 'Courier New', monospace; color: #0ff; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; padding: 20px; box-sizing: border-box; border: 1px solid rgba(0, 255, 255, 0.1); }
        .hud { position: absolute; background: rgba(0, 20, 40, 0.6); border-left: 3px solid #0ff; padding: 10px; backdrop-filter: blur(8px); }
        #header { top: 20px; left: 20px; font-size: 1.1rem; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 10px #0ff; }
        #evo-status { bottom: 20px; left: 20px; width: 240px; }
        #target-info { top: 20px; right: 20px; width: 180px; font-size: 11px; text-align: right; }
        .bar-bg { width: 100%; height: 4px; background: #033; margin-top: 5px; }
        #evo-bar { height: 100%; width: 0%; background: #0ff; box-shadow: 0 0 10px #0ff; transition: width 0.3s; }
        #alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f00; border: 2px solid #f00; padding: 20px; display: none; background: rgba(50, 0, 0, 0.8); animation: blink 0.5s infinite; font-weight: bold; z-index: 100; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #dust-overlay { position: absolute; inset: 0; background: rgba(80, 50, 20, 0); pointer-events: none; transition: background 2s; z-index: 50; }
    </style>
</head>
<body>
    <div id="dust-overlay"></div>
    <div id="alert">CRITICAL: TURBIDITY CURRENT DETECTED</div>
    <canvas id="mainCanvas"></canvas>
    <div id="ui-layer">
        <div id="header" class="hud">CAMBRIAN-LENS 0.508G<br><span style="font-size: 9px; opacity: 0.7;">ANCIENT BIOTOPE ANALYZER</span></div>
        <div id="target-info" class="hud">SCANNING...<br>TARGET: ANOMALOCARIS<br>SIZE: <span id="cur-size">60.2</span>cm<br>DIET: SOFT TISSUE</div>
        <div id="evo-status" class="hud">
            GENETIC EVOLUTION: <span id="lv-text">Lv.1</span><br>
            AMBER HARDNESS: <span id="hard-text">42</span>%
            <div class="bar-bg"><div id="evo-bar"></div></div>
        </div>
    </div>

    <script>
        /**
         * CAMBRIAN-LENS ENGINE (No-Library Edition)
         * 考古学的リアリティと未来的なUIを融合させた、ピュアJavaScriptによる3Dシミュレーター
         */
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, evolution = 0, time = 0;
        let isStriking = false, strikeCooldown = 0;
        let camX = 0, camY = 0, camZ = 400, targetCamZ = 400;

        // --- 3D Projection Engine ---
        function project(x, y, z) {
            const focalLength = 500;
            const scale = focalLength / (focalLength + z + camZ);
            return {
                x: width / 2 + (x + camX) * scale,
                y: height / 2 + (y + camY) * scale,
                scale: scale
            };
        }

        // --- Entities ---
        const trilobites = Array.from({length: 25}, () => ({
            x: Math.random() * 800 - 400, y: 150, z: Math.random() * 1000 - 500,
            speed: 1 + Math.random() * 2, alive: true, offset: Math.random() * Math.PI * 2
        }));

        const rival = { x: -300, y: 0, z: 200, active: true };

        // --- Main Logic ---
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Interaction
        const triggerStrike = () => { if(strikeCooldown <= 0) { isStriking = true; strikeCooldown = 30; } };
        window.addEventListener('mousedown', triggerStrike);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); triggerStrike(); }, {passive: false});
        window.addEventListener('wheel', (e) => { targetCamZ = Math.max(100, Math.min(800, targetCamZ + e.deltaY)); });

        // --- Rendering ---
        function draw() {
            time += 0.02;
            strikeCooldown = Math.max(0, strikeCooldown - 1);
            if(strikeCooldown === 0) isStriking = false;
            camZ += (targetCamZ - camZ) * 0.1;

            // Background (Deep Sea)
            const bgGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            bgGrad.addColorStop(0, '#001a2a');
            bgGrad.addColorStop(1, '#00050a');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            // Marine Snow (Particles)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            for(let i=0; i<40; i++) {
                const px = (Math.sin(time * 0.2 + i) * 0.5 + 0.5) * width;
                const py = (i * 50 + time * 30) % height;
                ctx.fillRect(px, py, 1.5, 1.5);
            }

            // Draw Trilobites (Prey)
            trilobites.forEach(t => {
                if(!t.alive) return;
                t.z -= t.speed; if(t.z < -500) t.z = 500;
                const p = project(t.x + Math.sin(time + t.offset)*20, t.y, t.z);
                if(p.scale <= 0) return;

                ctx.fillStyle = `rgba(80, 60, 40, ${p.scale})`;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, 15 * p.scale, 8 * p.scale, 0, 0, Math.PI*2);
                ctx.fill();

                // Collision with Strike
                if(isStriking && Math.abs(p.x - width/2) < 100 * p.scale && Math.abs(p.y - height/2) < 100 * p.scale) {
                    t.alive = false;
                    evolution = Math.min(1, evolution + 0.05);
                    updateUI();
                }
            });

            // Draw Anomalocaris (Main)
            const segments = 14;
            const evoScale = 1 + evolution * 0.5;
            for(let i = segments; i >= 0; i--) {
                const sz = i * 25 - 100;
                const wave = Math.sin(time * 3 - i * 0.5) * (20 + evolution * 10);
                const strikeMove = isStriking ? Math.sin(strikeCooldown * 0.2) * 80 : 0;
                
                const p = project(
                    Math.sin(time * 0.5) * 30, 
                    wave + (i === 0 ? strikeMove : 0), 
                    sz
                );

                if(p.scale <= 0) continue;

                const baseSize = (1 - i/segments) * 100 * evoScale * p.scale;
                
                // Amber Translucent Shader (Visualized in Canvas)
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, baseSize);
                const alpha = (0.4 + (1 - i/segments) * 0.4) * p.scale;
                const r = Math.floor(200 + evolution * 55);
                const g = Math.floor(120 + evolution * 80);
                grad.addColorStop(0, `rgba(${r}, ${g}, 50, ${alpha})`); // Center
                grad.addColorStop(1, `rgba(100, 40, 0, ${alpha * 0.3})`); // Edge (Fresnel)

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, baseSize, baseSize * 0.4, Math.sin(time + i*0.1)*0.2, 0, Math.PI*2);
                ctx.fill();

                // 複眼 (Complex Eyes)
                if(i === 0) {
                    ctx.fillStyle = '#0ff';
                    ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
                    ctx.beginPath();
                    ctx.arc(p.x - baseSize*0.6, p.y - baseSize*0.3, 8*p.scale, 0, Math.PI*2);
                    ctx.arc(p.x + baseSize*0.6, p.y - baseSize*0.3, 8*p.scale, 0, Math.PI*2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            requestAnimationFrame(draw);
        }

        function updateUI() {
            document.getElementById('evo-bar').style.width = (evolution * 100) + '%';
            document.getElementById('lv-text').innerText = 'Lv.' + Math.floor(evolution * 10 + 1);
            document.getElementById('hard-text').innerText = Math.floor(42 + evolution * 50);
            document.getElementById('cur-size').innerText = (60.2 + evolution * 20).toFixed(1);
        }

        // --- Turbidity Current (Eternal Return) ---
        setInterval(() => {
            const alert = document.getElementById('alert');
            const dust = document.getElementById('dust-overlay');
            alert.style.display = 'block';
            dust.style.background = 'rgba(100, 70, 30, 0.8)';
            
            setTimeout(() => {
                alert.style.display = 'none';
                dust.style.background = 'rgba(100, 70, 30, 0)';
                // リセットと回帰
                trilobites.forEach(t => t.alive = true);
                evolution *= 0.8;
                updateUI();
            }, 4000);
        }, 25000);

        draw();
    </script>
</body>
</html>
