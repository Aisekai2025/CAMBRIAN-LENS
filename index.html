<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CAMBRIAN-LENS | BURGESS-OS 0.508G</title>
<style>
  :root {
    --neon-blue: #0ff;
    --neon-alert: #f90;
  }
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
    font-family: 'Courier New', Courier, monospace;
    touch-action: none;
    user-select: none;
  }
  #canvas-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }
  /* BURGESS-OS UI */
  #ui-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
    background:
      linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .os-header {
    position: absolute; top: 15px; left: 15px;
    color: var(--neon-blue);
    text-shadow: 0 0 5px var(--neon-blue);
    font-size: 14px;
    border-left: 2px solid var(--neon-blue);
    padding-left: 10px;
  }
  .os-stats {
    position: absolute; bottom: 15px; left: 15px;
    color: var(--neon-blue);
    font-size: 12px;
  }
  .scan-line {
    position: absolute; width: 100%; height: 2px;
    background: rgba(0, 255, 255, 0.2);
    animation: scan 4s linear infinite;
  }
  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }
  /* Turbidity Current (乱泥流) Overlay */
  #turbidity-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #3b2a1a;
    opacity: 0;
    z-index: 20;
    pointer-events: none;
    transition: opacity 2s ease-in-out;
  }
  /* Info Modal */
  #info-panel {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    background: rgba(0, 20, 30, 0.85);
    border: 1px solid var(--neon-blue);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    color: #fff;
    padding: 20px;
    z-index: 30;
    display: none;
    pointer-events: auto;
    border-radius: 5px;
  }
  #info-panel h2 { margin: 0 0 10px; color: var(--neon-blue); font-size: 18px; }
  #info-panel p { font-size: 13px; line-height: 1.4; color: #ccc; }
  .close-btn {
    display: inline-block; margin-top: 15px; padding: 5px 10px;
    border: 1px solid var(--neon-blue); color: var(--neon-blue);
    cursor: pointer; font-size: 12px; text-transform: uppercase;
  }
  .close-btn:hover { background: var(--neon-blue); color: #000; }
  #target-reticle {
    position: absolute; top: 50%; left: 50%;
    width: 40px; height: 40px;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
  }
  #target-reticle::after {
    content: ''; position: absolute; top: 18px; left: 18px;
    width: 4px; height: 4px; background: var(--neon-blue); border-radius: 50%;
  }
</style>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-layer">
    <div class="scan-line"></div>
    <div class="os-header">
      BURGESS-OS v0.508G<br>
      <span style="font-size: 10px; color: #aaa;">SYS.STATUS: ONLINE // BIOME: MIDDLE CAMBRIAN</span>
    </div>
    <div class="os-stats" id="stats">
      EVOLUTION LEVEL: 1.00<br>
      TARGETS: SCANNING...
    </div>
    <div id="target-reticle"></div>
  </div>
  <div id="turbidity-overlay"></div>
  <div id="info-panel">
    <h2 id="info-title">Species Name</h2>
    <p id="info-desc">Description goes here.</p>
    <div class="close-btn" onclick="resumeTime()">RESUME SIMULATION</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Core Variables ---
    let scene, camera, renderer, controls;
    let clock = new THREE.Clock();
    let timeScale = 1.0;
    let globalTime = 0;
    let evolutionLevel = 1.0;
    let cycleTimer = 0;
    
    const entities = [];
    let anomalocaris;

    // --- Procedural Shaders & Materials ---
    const amberShader = {
      uniforms: {
        time: { value: 0 },
        evolution: { value: 1.0 },
        baseColor: { value: new THREE.Color(0x994411) },
        rimColor: { value: new THREE.Color(0xffaa22) }
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        varying vec2 vUv;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vUv = uv;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          vViewPosition = -mvPosition.xyz;
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        uniform float evolution;
        uniform vec3 baseColor;
        uniform vec3 rimColor;
        varying vec3 vNormal;
        varying vec3 vViewPosition;
        varying vec2 vUv;
        void main() {
          vec3 normal = normalize(vNormal);
          vec3 viewDir = normalize(vViewPosition);
          float fresnel = dot(viewDir, normal);
          fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
          fresnel = pow(fresnel, 2.5);
          float dots = sin(vUv.x * 60.0) * sin(vUv.y * 60.0);
          vec3 color = mix(baseColor, vec3(0.5, 0.1, 0.0), step(0.9, dots) * 0.3);
          vec3 finalColor = color + (rimColor * fresnel * evolution);
          gl_FragColor = vec4(finalColor, 0.7 + fresnel * 0.3);
        }
      `,
      transparent: true,
      side: THREE.DoubleSide
    };

    const floorMaterial = new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 } },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vPos;
        void main() {
          vUv = uv;
          vPos = position;
          float bump = sin(position.x * 0.5) * cos(position.z * 0.5) * 2.0;
          vec3 pos = position + vec3(0.0, bump, 0.0);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `,
      fragmentShader: `
        uniform float time;
        varying vec2 vUv;
        varying vec3 vPos;
        void main() {
          vec3 baseColor = vec3(0.05, 0.1, 0.15);
          vec2 p = vPos.xz * 0.2;
          for(int i = 1; i < 4; i++) {
            vec2 newp = p;
            newp.x += 0.6 / float(i) * sin(float(i) * p.y + time * 0.5 + 0.3);
            newp.y += 0.6 / float(i) * cos(float(i) * p.x + time * 0.5 + 0.3);
            p = newp;
          }
          float caustics = max(0.0, sin(p.x + p.y));
          caustics = pow(caustics, 3.0);
          vec3 color = baseColor + vec3(0.1, 0.4, 0.6) * caustics * 0.5;
          float fade = smoothstep(100.0, 0.0, length(vPos));
          gl_FragColor = vec4(color * fade, 1.0);
        }
      `
    });

    // --- Initialize Scene ---
    function init() {
      const container = document.getElementById('canvas-container');
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x001122);
      container.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x001122, 0.015);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(0, 15, 30);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 - 0.1;
      controls.minDistance = 5;
      controls.maxDistance = 60;

      const ambientLight = new THREE.AmbientLight(0x003355, 1.2);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0x4488ff, 1.8);
      dirLight.position.set(10, 50, 20);
      scene.add(dirLight);

      buildEnvironment();

      anomalocaris = new Anomalocaris();
      entities.push(anomalocaris);
      for(let i = 0; i < 8; i++) entities.push(new Trilobite());
      for(let i = 0; i < 3; i++) entities.push(new Hurdia());
      for(let i = 0; i < 2; i++) entities.push(new Opabinia());

      window.addEventListener('resize', onWindowResize);
      renderer.domElement.addEventListener('pointerdown', onPointerDown);

      animate();
    }

    // --- Build Environment ---
    function buildEnvironment() {
      const floorGeo = new THREE.PlaneGeometry(200, 200, 64, 64);
      floorGeo.rotateX(-Math.PI / 2);
      const floor = new THREE.Mesh(floorGeo, floorMaterial);
      floor.position.y = -10;
      scene.add(floor);

      const algaeGeo = new THREE.CylinderGeometry(0.1, 0.3, 5, 8);
      algaeGeo.translate(0, 2.5, 0);
      const algaeMat = new THREE.MeshBasicMaterial({ color: 0x114422, transparent: true, opacity: 0.8 });
      
      for(let i = 0; i < 30; i++) {
        const algae = new THREE.Mesh(algaeGeo, algaeMat);
        algae.position.set((Math.random() - 0.5) * 80, -10, (Math.random() - 0.5) * 80);
        algae.userData.phaseOffset = Math.random() * Math.PI * 2;
        scene.add(algae);
        entities.push({
          type: 'algae', mesh: algae,
          update: (t) => {
            algae.rotation.z = Math.sin(t * 1.5 + algae.userData.phaseOffset) * 0.2;
            algae.rotation.x = Math.cos(t * 1.0 + algae.userData.phaseOffset) * 0.2;
          }
        });
      }
    }

    // --- Base Entity ---
    class PreyEntity {
      constructor(type, speed) {
        this.type = type;
        this.speed = speed;
        this.mesh = new THREE.Group();
        this.respawn();
        scene.add(this.mesh);
      }
      respawn() {
        this.mesh.position.set((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 15 - 2, (Math.random() - 0.5) * 60);
        this.target = new THREE.Vector3((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 60);
      }
      update(t, delta) {
        if(this.mesh.position.distanceTo(this.target) < 2) {
          this.target.set((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 60);
        }
        const dir = this.target.clone().sub(this.mesh.position).normalize();
        this.mesh.lookAt(this.target);
        this.mesh.position.add(dir.multiplyScalar(this.speed * timeScale));
      }
    }

    // --- Creature Classes (Scientifically Polished) ---
    
    // 1. Anomalocaris (Apex Predator)
    class Anomalocaris {
      constructor() {
        this.type = 'Anomalocaris';
        this.mesh = new THREE.Group();
        this.velocity = new THREE.Vector3(0, 0, 0.05);
        this.isAttacking = false;
        this.attackProgress = 0;
        
        const material = new THREE.ShaderMaterial(amberShader);
        this.materialUniforms = material.uniforms;
        
        // Body Segments
        this.segments = [];
        for(let i = 0; i < 12; i++) {
          const radius = i < 3 ? 1.0 - (i * 0.05) : 0.85 - ((i - 3) * 0.08);
          const geo = new THREE.SphereGeometry(radius, 24, 16);
          geo.scale(1.2, 0.4, 1.0);
          const mesh = new THREE.Mesh(geo, material);
          mesh.position.z = -i * 0.8;
          this.segments.push(mesh);
          this.mesh.add(mesh);
        }

        const detailMat = new THREE.MeshLambertMaterial({ color: 0x050505 });

        // Stalked Eyes (眼柄と巨大な複眼)
        const eyeGrpL = new THREE.Group();
        const stalkL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), material);
        stalkL.rotation.z = Math.PI / 2;
        stalkL.position.set(0.6, 0.2, 0);
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), detailMat);
        eyeL.position.set(0.9, 0.2, 0);
        eyeGrpL.add(stalkL, eyeL);
        eyeGrpL.position.z = 0.3;
        
        const eyeGrpR = new THREE.Group();
        const stalkR = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), material);
        stalkR.rotation.z = -Math.PI / 2;
        stalkR.position.set(-0.6, 0.2, 0);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), detailMat);
        eyeR.position.set(-0.9, 0.2, 0);
        eyeGrpR.add(stalkR, eyeR);
        eyeGrpR.position.z = 0.3;
        
        this.segments[0].add(eyeGrpL, eyeGrpR);

        // Oral Cone / Mouth (ペイトイア型口器)
        const mouthGeo = new THREE.TorusGeometry(0.25, 0.1, 16, 16);
        const mouth = new THREE.Mesh(mouthGeo, detailMat);
        mouth.rotation.x = Math.PI / 2;
        mouth.position.set(0, -0.4, 0.4);
        this.segments[0].add(mouth);

        // Articulated Frontal Appendages (多関節構造と棘)
        this.appendagesChains = [];
        for(let side of [-1, 1]) {
            let prevNode = this.segments[0];
            const nodes = [];
            for(let j = 0; j < 6; j++) {
                const nodeGrp = new THREE.Group();
                const part = new THREE.Mesh(new THREE.CylinderGeometry(0.1 - j*0.01, 0.08 - j*0.01, 0.4, 8), material);
                part.position.y = -0.2; // Pivot offset
                
                // Ventral Spines (獲物を捕らえるための棘)
                const spine = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.25, 4), material);
                spine.rotation.x = -Math.PI / 4;
                spine.position.set(0, -0.2, -0.15);
                part.add(spine);

                nodeGrp.add(part);

                if (j === 0) {
                    nodeGrp.position.set(side * 0.3, -0.2, 1.0);
                    nodeGrp.rotation.x = Math.PI / 2;
                } else {
                    nodeGrp.position.y = -0.4;
                }
                prevNode.add(nodeGrp);
                prevNode = nodeGrp;
                nodes.push(nodeGrp);
            }
            this.appendagesChains.push(nodes);
        }

        // Flaps
        this.flaps = [];
        const flapGeo = new THREE.PlaneGeometry(3.5, 1.5);
        flapGeo.translate(1.75, 0, 0); 
        for(let i = 0; i < 14; i++) {
          const flapR = new THREE.Mesh(flapGeo, material);
          flapR.position.set(0.5, -0.1, -i * 0.65);
          const flapL = new THREE.Mesh(flapGeo, material);
          flapL.position.set(-0.5, -0.1, -i * 0.65);
          flapL.rotation.y = Math.PI; 
          this.mesh.add(flapR, flapL);
          this.flaps.push({ r: flapR, l: flapL, index: i });
        }
        
        // Tail Fan (3対のブレード状構造)
        for(let i=0; i<3; i++) {
            const tailGeo = new THREE.PlaneGeometry(2.5 - i*0.4, 1.5);
            tailGeo.rotateX(-Math.PI / 2);
            const tailFan = new THREE.Mesh(tailGeo, material);
            tailFan.position.set(0, 0.1, -10.0 - i*0.6);
            tailFan.rotation.y = i * 0.1;
            this.mesh.add(tailFan);
        }

        scene.add(this.mesh);
        this.mesh.position.set(0, 0, 0);
      }

      update(t, delta) {
        this.materialUniforms.time.value = t;
        this.materialUniforms.evolution.value = evolutionLevel;
        
        this.mesh.rotation.y += Math.sin(t * 0.4) * 0.012;
        this.mesh.translateZ(0.1 * evolutionLevel * timeScale);

        if(this.mesh.position.length() > 40) {
          this.mesh.position.multiplyScalar(0.99);
          this.mesh.rotation.y += 0.05;
        }
        if(this.mesh.position.y > 10) this.mesh.position.y -= 0.1;
        if(this.mesh.position.y < -5) this.mesh.position.y += 0.1;

        this.flaps.forEach(flap => {
          const phase = t * 7.0 - flap.index * 0.5;
          const angle = Math.sin(phase) * 0.45;
          flap.r.rotation.z = angle;
          flap.l.rotation.z = -angle;
        });

        this.segments.forEach((seg, i) => {
          seg.position.x = Math.sin(t * 2.5 - i * 0.4) * 0.15;
          seg.rotation.y = Math.cos(t * 2.5 - i * 0.4) * 0.08;
        });

        if (this.isAttacking) {
          this.attackProgress += delta * 6.0;
          const angle = Math.sin(this.attackProgress) * Math.PI / 2.5;
          
          // Articulated appendages curling
          this.appendagesChains.forEach((nodes, sideIndex) => {
              nodes.forEach((node, j) => {
                  if(j === 0) {
                      node.rotation.x = Math.PI / 2.2 + angle;
                      node.rotation.z = (sideIndex === 0 ? 1 : -1) * angle * 0.5;
                  } else {
                      node.rotation.x = angle * 0.6; // 巻くように曲がる
                  }
              });
          });

          if(this.attackProgress > Math.PI) {
            this.isAttacking = false;
            this.attackProgress = 0;
            this.appendagesChains.forEach(nodes => {
                nodes.forEach((node, j) => {
                    if(j===0) node.rotation.set(Math.PI / 2.2, 0, 0);
                    else node.rotation.x = 0;
                });
            });
            growEvolve();
          }
        } else {
          let nearest = null;
          let minDist = 15;
          entities.forEach(e => {
            if(e.type === 'Trilobite' || e.type === 'Opabinia') {
              const dist = this.mesh.position.distanceTo(e.mesh.position);
              if(dist < minDist) { minDist = dist; nearest = e; }
            }
          });
          if(nearest) {
            const targetRotation = Math.atan2(nearest.mesh.position.x - this.mesh.position.x, nearest.mesh.position.z - this.mesh.position.z);
            this.mesh.rotation.y += (targetRotation - this.mesh.rotation.y) * 0.05;
            if(minDist < 3.5) {
              this.isAttacking = true;
              nearest.respawn(); 
            }
          }
        }
      }
    }

    // 2. Opabinia (Scavenger)
    class Opabinia extends PreyEntity { 
      constructor() { 
        super('Opabinia', 0.035); 
        const mat = new THREE.MeshLambertMaterial({ color: 0x4466aa });
        const detailMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        
        this.segments = [];
        this.flaps = [];

        // Body Segments & Lateral Flaps
        const flapGeo = new THREE.PlaneGeometry(0.8, 0.4);
        flapGeo.translate(0.4, 0, 0);

        for(let i = 0; i < 15; i++) { // 学説通り約15対の体節
            const radius = 0.25 - (i * 0.012);
            const geo = new THREE.CylinderGeometry(radius, radius, 0.25, 10);
            geo.rotateX(Math.PI / 2);
            const seg = new THREE.Mesh(geo, mat);
            seg.position.z = -i * 0.22;
            this.segments.push(seg);
            this.mesh.add(seg);

            // 遊泳用の葉（Flaps）
            const fR = new THREE.Mesh(flapGeo, mat);
            fR.position.set(radius - 0.05, -0.1, 0);
            const fL = new THREE.Mesh(flapGeo, mat);
            fL.position.set(-(radius - 0.05), -0.1, 0);
            fL.rotation.y = Math.PI;
            seg.add(fR, fL);
            this.flaps.push({r: fR, l: fL, index: i});
        }

        // 5 Eyes (キノコ状の眼柄)
        const eyePositions = [[0, 0.35, 0.15], [0.15, 0.35, 0], [-0.15, 0.35, 0], [0.2, 0.25, -0.15], [-0.2, 0.25, -0.15]];
        eyePositions.forEach(pos => {
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), detailMat);
            const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15), mat);
            stalk.position.set(pos[0], pos[1] - 0.05, pos[2]);
            eye.position.set(pos[0], pos[1], pos[2]);
            this.segments[0].add(eye, stalk);
        });

        // Mouth (後ろ向きの口)
        const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.03, 8, 16), detailMat);
        mouth.rotation.x = Math.PI / 2;
        mouth.position.set(0, -0.25, -0.15);
        this.segments[0].add(mouth);

        // Proboscis (ノズル状の吻)
        this.proboscis = [];
        for(let i = 0; i < 6; i++) {
            const node = new THREE.Mesh(new THREE.SphereGeometry(0.08 - (i * 0.005), 8, 8), mat);
            this.proboscis.push(node);
            this.mesh.add(node);
        }

        // Tail Blades (尾扇)
        for(let i=0; i<3; i++) {
            const tailM = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.8), mat);
            tailM.rotation.x = -Math.PI / 2;
            tailM.rotation.y = (i - 1) * 0.3; // 広がるように配置
            this.segments[14].add(tailM);
        }
      }
      update(t, delta) {
        super.update(t, delta);
        this.target.y = -9.0;
        
        // メタクロナルウェーブ（Flaps）
        this.flaps.forEach(f => {
            const phase = t * 10.0 - f.index * 0.6;
            f.r.rotation.z = Math.sin(phase) * 0.3;
            f.l.rotation.z = -Math.sin(phase) * 0.3;
        });

        this.segments.forEach((seg, i) => {
            seg.position.y = Math.sin(t * 5.0 - i * 0.6) * 0.08;
        });

        // 先端に爪がある吻部の動き
        this.proboscis.forEach((node, i) => {
            const offsetZ = 0.2 + (i * 0.12);
            node.position.set(
                this.segments[0].position.x + Math.sin(t * 4 + i) * 0.1,
                this.segments[0].position.y + Math.cos(t * 3 + i) * 0.15 - 0.1,
                this.segments[0].position.z + offsetZ
            );
        });
      }
    }

    // 3. Trilobite (Benthic Arthropod)
    class Trilobite extends PreyEntity { 
      constructor() { 
        super('Trilobite', 0.04); 
        const mat = new THREE.MeshLambertMaterial({ color: 0x556655 });
        const detailMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        
        this.segments = [];
        
        // Cephalon (頭部)
        const headGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.15, 16, 1, false, 0, Math.PI);
        const head = new THREE.Mesh(headGeo, mat);
        head.rotation.y = Math.PI / 2;
        head.position.z = 0.2;
        this.mesh.add(head);

        // Crescent Eyes (複眼)
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), detailMat);
        eyeR.scale.set(0.5, 1, 1.5);
        eyeR.position.set(0.2, 0.1, -0.1);
        const eyeL = eyeR.clone();
        eyeL.position.set(-0.2, 0.1, -0.1);
        head.add(eyeR, eyeL);

        // Antennae (触角)
        const antGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.5);
        const antR = new THREE.Mesh(antGeo, detailMat);
        antR.rotation.x = Math.PI / 2;
        antR.rotation.z = -Math.PI / 6;
        antR.position.set(0.15, -0.05, 0.3);
        const antL = new THREE.Mesh(antGeo, detailMat);
        antL.rotation.x = Math.PI / 2;
        antL.rotation.z = Math.PI / 6;
        antL.position.set(-0.15, -0.05, 0.3);
        head.add(antR, antL);

        // Thorax & Pygidium (胸部と尾部)
        for(let i = 0; i < 8; i++) {
          const w = 0.7 - (i * 0.05);
          const geo = new THREE.CylinderGeometry(w/2, w/2, 0.1, 16, 1, false, 0, Math.PI);
          const seg = new THREE.Mesh(geo, mat);
          seg.rotation.y = Math.PI / 2;
          seg.position.z = -0.05 - (i * 0.12);
          this.segments.push(seg);
          this.mesh.add(seg);
        }
      }
      update(t, delta) {
        super.update(t, delta);
        if(anomalocaris && this.mesh.position.distanceTo(anomalocaris.mesh.position) < 20) {
          const fleeDir = this.mesh.position.clone().sub(anomalocaris.mesh.position).normalize();
          this.target.copy(this.mesh.position).add(fleeDir.multiplyScalar(10));
          this.mesh.position.y = -9.8; 
        }
        // 足の動きの代わりの細かなピッチ揺れ
        this.segments.forEach((seg, i) => {
          seg.rotation.x = Math.sin(t * 12.0 - i * 0.5) * 0.08;
        });
      }
    }

    // 4. Hurdia (Competitor with massive carapace)
    class Hurdia extends PreyEntity { 
      constructor() { 
        super('Hurdia', 0.06); 
        const mat = new THREE.MeshLambertMaterial({ color: 0xaa5533 });
        const detailMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        
        this.meshGrp = new THREE.Group();

        // Massive Frontal Carapace (巨大なH要素・P要素甲殻)
        const carapaceGrp = new THREE.Group();
        const mainH = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.8, 3), mat);
        mainH.rotation.x = -Math.PI / 2;
        mainH.position.z = 0.9;
        carapaceGrp.add(mainH);
        this.meshGrp.add(carapaceGrp);

        // Stalked Eyes emerging from carapace notches (甲殻の隙間から出る眼柄)
        const eyeGrpR = new THREE.Group();
        const stalkR = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3), mat);
        stalkR.rotation.z = -Math.PI / 2;
        stalkR.position.x = 0.15;
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), detailMat);
        eyeR.position.x = 0.3;
        eyeGrpR.add(stalkR, eyeR);
        eyeGrpR.position.set(0.2, 0, 0.5);
        
        const eyeGrpL = eyeGrpR.clone();
        eyeGrpL.rotation.y = Math.PI;
        eyeGrpL.position.set(-0.2, 0, 0.5);
        carapaceGrp.add(eyeGrpR, eyeGrpL);

        // Oral Cone (口器)
        const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.05, 8, 16), detailMat);
        mouth.rotation.x = Math.PI / 2;
        mouth.position.set(0, -0.3, 0.3);
        carapaceGrp.add(mouth);

        // Body Segments & Flaps (体節とエラ)
        this.bodySegs = [];
        this.flaps = [];
        const flapGeo = new THREE.PlaneGeometry(1.2, 0.5);
        flapGeo.translate(0.6, 0, 0);

        for(let i=0; i<8; i++) {
            const seg = new THREE.Mesh(new THREE.CylinderGeometry(0.3 - i*0.02, 0.3 - i*0.02, 0.3, 12), mat);
            seg.rotation.x = Math.PI / 2;
            seg.position.z = -0.2 - i*0.25;
            
            const fR = new THREE.Mesh(flapGeo, mat);
            fR.position.set(0.2, -0.1, 0);
            const fL = new THREE.Mesh(flapGeo, mat);
            fL.position.set(-0.2, -0.1, 0);
            fL.rotation.y = Math.PI;
            seg.add(fR, fL);

            this.flaps.push({r: fR, l: fL, index: i});
            this.bodySegs.push(seg);
            this.meshGrp.add(seg);
        }

        this.mesh.add(this.meshGrp);
      }
      update(t, delta) {
        super.update(t, delta);
        // 甲殻の重みを表現したロール
        this.meshGrp.rotation.z = Math.sin(t * 3.0) * 0.12;
        
        this.flaps.forEach(f => {
            const phase = t * 8.0 - f.index * 0.5;
            f.r.rotation.z = Math.sin(phase) * 0.3;
            f.l.rotation.z = -Math.sin(phase) * 0.3;
        });

        this.bodySegs.forEach((seg, i) => {
            seg.position.x = Math.sin(t * 5.0 - i * 0.4) * 0.1;
        });
      }
    }

    // --- System Logic & Interaction ---
    function growEvolve() {
      evolutionLevel += 0.05;
      anomalocaris.mesh.scale.setScalar(1.0 + (evolutionLevel - 1.0) * 0.5);
      document.getElementById('stats').innerHTML = `EVOLUTION LEVEL: ${evolutionLevel.toFixed(2)}<br>TARGETS: PREDATION SUCCESS`;
    }

    function triggerTurbidityCurrent() {
      const overlay = document.getElementById('turbidity-overlay');
      overlay.style.opacity = 1;
      setTimeout(() => {
        entities.forEach(e => {
          if(e.respawn) e.respawn();
          else if(e.type === 'Anomalocaris') e.mesh.position.set(0,0,0);
        });
        overlay.style.opacity = 0;
      }, 2000);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onPointerDown(event) {
      const x = event.touches ? event.touches[0].clientX : event.clientX;
      const y = event.touches ? event.touches[0].clientY : event.clientY;
      
      mouse.x = (x / window.innerWidth) * 2 - 1;
      mouse.y = -(y / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      
      const checkMeshes = [];
      entities.forEach(e => { if(e.mesh && e.type !== 'algae') checkMeshes.push(e.mesh); });
      const intersects = raycaster.intersectObjects(checkMeshes, true);
      
      if (intersects.length > 0) {
        let object = intersects[0].object;
        while(object.parent && object.parent.type === 'Group') {
          object = object.parent;
        }
        
        const entity = entities.find(e => e.mesh === object || e.mesh.children.includes(object));
        if(entity) {
          showInfo(entity.type);
          if(entity.type === 'Anomalocaris') entity.isAttacking = true;
        }
      }
    }

    function showInfo(type) {
      timeScale = 0.2;
      const panel = document.getElementById('info-panel');
      const title = document.getElementById('info-title');
      const desc = document.getElementById('info-desc');
      
      const database = {
        'Anomalocaris': '【アノマロカリス】<br>カンブリア紀の頂点捕食者。多関節の前肢とペイトイア（円座状の口器）、眼柄を持つ複眼が特徴。',
        'Trilobite': '【三葉虫】<br>頭部・胸部・尾部が分化した底生節足動物。頭部には三日月型の眼と触角を備える。',
        'Hurdia': '【フルディア】<br>体長に匹敵する巨大なH要素・P要素甲殻を持つラディオドンタ類。切れ込みから眼柄を突き出す。',
        'Opabinia': '【オパビニア】<br>5つの眼と先端に爪のある吻を持つ。15対の遊泳葉と3対の尾扇を使いメタクロナルウェーブで泳ぐ。'
      };

      title.innerText = type;
      desc.innerHTML = database[type] || 'NO DATA FOUND.';
      panel.style.display = 'block';
    }

    window.resumeTime = function() {
      timeScale = 1.0;
      document.getElementById('info-panel').style.display = 'none';
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      globalTime += delta * timeScale;

      entities.forEach(entity => {
        if(entity.update) entity.update(globalTime, delta);
      });

      floorMaterial.uniforms.time.value = globalTime;

      cycleTimer += delta;
      if(cycleTimer > 60) {
        cycleTimer = 0;
        triggerTurbidityCurrent();
      }

      controls.update();
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
