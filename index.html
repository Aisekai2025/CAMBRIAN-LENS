<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAMBRIAN-LENS: ETERNAL RETURN</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Consolas', monospace; color: #0ff; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        #ui { position: absolute; inset: 0; pointer-events: none; padding: 20px; border: 1px solid rgba(0, 255, 255, 0.1); }
        .panel { position: absolute; background: rgba(0, 20, 40, 0.5); border-left: 3px solid #0ff; padding: 10px; backdrop-filter: blur(10px); transition: all 0.5s; }
        #header { top: 20px; left: 20px; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; }
        #evo-status { bottom: 20px; left: 20px; width: 220px; }
        #alert { top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #f00; color: #f00; display: none; padding: 20px; background: rgba(50, 0, 0, 0.8); animation: blink 0.5s infinite; z-index: 100; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .progress-bar { width: 100%; height: 4px; background: #033; margin-top: 5px; }
        #evo-progress { height: 100%; width: 0%; background: #0ff; box-shadow: 0 0 10px #0ff; }
        #dust-overlay { position: absolute; inset: 0; background: rgba(80, 50, 20, 0); pointer-events: none; transition: background 2s; z-index: 50; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="dust-overlay"></div>
        <div id="ui">
            <div id="header">CAMBRIAN-LENS 0.508G</div>
            <div id="evo-status" class="panel">
                GENETIC EVOLUTION: <span id="evo-lv">Lv.1</span><br>
                AMBER HARDNESS: <span id="hardness">42%</span>
                <div class="progress-bar"><div id="evo-progress"></div></div>
            </div>
            <div id="alert">CRITICAL: TURBIDITY CURRENT DETECTED</div>
        </div>
    </div>

    <!-- 修正：最も安定した配信元(esm.sh)に変更 -->
    <script type="module">
        import * as THREE from 'https://esm.sh';

        let evolution = 0;
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x001015, 0.1);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const amberMat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uEvo: { value: 0.0 }, uColor: { value: new THREE.Color(0xffaa22) } },
            vertexShader: `
                varying vec3 vNormal; varying vec3 vViewDir;
                void main() {
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    vNormal = normalize(normalMatrix * normal);
                    vViewDir = normalize(-mvPos.xyz);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                uniform float uTime; uniform float uEvo; uniform vec3 uColor;
                varying vec3 vNormal; varying vec3 vViewDir;
                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vViewDir), 2.0);
                    vec3 finalColor = mix(uColor, vec3(1.0, 0.9, 0.5), uEvo);
                    gl_FragColor = vec4(finalColor + fresnel * (0.3 + uEvo * 0.5), 0.5 + uEvo * 0.3 + fresnel * 0.5);
                }
            `,
            transparent: true, side: THREE.DoubleSide
        });

        const bodyGroup = new THREE.Group();
        const segments = [];
        for(let i=0; i<14; i++) {
            const size = (1 - i/14) * 0.8;
            const seg = new THREE.Mesh(new THREE.BoxGeometry(size, 0.2, 0.4), amberMat);
            seg.position.z = -i * 0.35;
            segments.push(seg);
            bodyGroup.add(seg);
        }
        scene.add(bodyGroup);

        const trilobites = [];
        const triMat = new THREE.MeshPhongMaterial({ color: 0x443322 });
        for(let i=0; i<40; i++) {
            const tri = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 0), triMat);
            tri.position.set(Math.random()*10-5, -1.5, Math.random()*10-5);
            tri.userData = { speed: 0.02 + Math.random()*0.02, alive: true };
            trilobites.push(tri);
            scene.add(tri);
        }

        const light = new THREE.PointLight(0x00ffff, 100);
        light.position.set(0, 5, 0);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x001122, 2));

        let isStriking = false;
        const doStrike = () => { isStriking = true; setTimeout(() => isStriking = false, 300); };
        window.addEventListener('mousedown', doStrike);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); doStrike(); }, { passive: false });

        function animate(time) {
            requestAnimationFrame(animate);
            const t = time * 0.001;
            amberMat.uniforms.uTime.value = t;
            amberMat.uniforms.uEvo.value = evolution;

            segments.forEach((s, i) => {
                s.rotation.x = Math.sin(t * 2 + i * 0.4) * 0.2 + (isStriking ? -1.2 : 0);
                s.scale.setScalar(1 + evolution * 0.5);
            });

            trilobites.forEach(tri => {
                if(!tri.userData.alive) return;
                tri.position.z += tri.userData.speed;
                if(tri.position.z > 5) tri.position.z = -5;
                if(isStriking && tri.position.distanceTo(bodyGroup.position) < 1.8) {
                    tri.userData.alive = false; tri.visible = false;
                    evolution = Math.min(1.0, evolution + 0.05);
                    document.getElementById('evo-progress').style.width = (evolution * 100) + '%';
                    document.getElementById('evo-lv').innerText = 'Lv.' + Math.floor(evolution * 10 + 1);
                    document.getElementById('hardness').innerText = Math.floor(42 + evolution * 50) + '%';
                }
            });

            camera.lookAt(bodyGroup.position);
            renderer.render(scene, camera);
        }
        animate(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
