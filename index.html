<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAMBRIAN-LENS: PURE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Consolas', monospace; color: #0ff; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; }
        .hud { border-left: 2px solid #0ff; padding-left: 10px; background: rgba(0, 40, 80, 0.2); }
        #header { font-size: 1.2rem; font-weight: bold; letter-spacing: 4px; }
        #evo-status { position: absolute; bottom: 20px; left: 20px; }
        #alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f00; border: 2px solid #f00; padding: 10px; display: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div id="header" class="hud">CAMBRIAN-LENS 0.508G<br><span style="font-size: 10px;">PURE JS ENGINE (NO-LIBRARY)</span></div>
        <div id="evo-status" class="hud">EVOLUTION: <span id="lv">Lv.1</span><br>STATUS: OBSERVED</div>
        <div id="alert">TURBIDITY CURRENT DETECTED</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let evolution = 0;

        // 3Dポイントを2D画面に変換する関数
        function project(x, y, z) {
            const perspective = 400 / (400 + z);
            return {
                x: width / 2 + x * perspective,
                y: height / 2 + y * perspective,
                scale: perspective
            };
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let isStriking = false;
        window.addEventListener('mousedown', () => { isStriking = true; setTimeout(() => isStriking = false, 300); });
        window.addEventListener('touchstart', (e) => { isStriking = true; setTimeout(() => isStriking = false, 300); });

        function draw() {
            const time = Date.now() * 0.002;
            ctx.fillStyle = '#000810';
            ctx.fillRect(0, 0, width, height);

            // マリンスノーの描写
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            for(let i=0; i<50; i++) {
                const x = (Math.sin(time * 0.1 + i) * 0.5 + 0.5) * width;
                const y = ((time * 50 + i * 100) % height);
                ctx.fillRect(x, y, 2, 2);
            }

            // アノマロカリスの節（セグメント）を描写
            const segments = 14;
            for (let i = segments; i >= 0; i--) {
                const z = i * 40 - 100;
                const wave = Math.sin(time + i * 0.4) * 30;
                const strikeOffset = isStriking ? -100 : 0;
                
                const pos = project(
                    Math.sin(time * 0.5) * 50, 
                    wave + strikeOffset * (1 - i/segments), 
                    z
                );

                const size = (1 - i / segments) * 80 * (1 + evolution);
                
                // 琥珀色の半透明グラデーション
                const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size * pos.scale);
                const alpha = 0.6 * pos.scale;
                grad.addColorStop(0, `rgba(255, 200, 50, ${alpha})`); // 琥珀の中心
                grad.addColorStop(1, `rgba(150, 70, 0, ${alpha * 0.5})`); // 琥珀の縁

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(pos.x, pos.y, size * pos.scale, size * 0.4 * pos.scale, (i * 0.1), 0, Math.PI * 2);
                ctx.fill();

                // 目の描写（先頭だけ）
                if (i === 0) {
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.arc(pos.x - 40 * pos.scale, pos.y - 20 * pos.scale, 10 * pos.scale, 0, Math.PI * 2);
                    ctx.arc(pos.x + 40 * pos.scale, pos.y - 20 * pos.scale, 10 * pos.scale, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 簡易的な獲物
            if (!isStriking) {
                ctx.fillStyle = '#432';
                const triPos = project(Math.cos(time) * 200, 100, Math.sin(time) * 100);
                ctx.beginPath();
                ctx.arc(triPos.x, triPos.y, 10 * triPos.scale, 0, Math.PI * 2);
                ctx.fill();
            } else {
                evolution = Math.min(1.0, evolution + 0.001);
                document.getElementById('lv').innerText = 'Lv.' + Math.floor(evolution * 10 + 1);
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
