<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAMBRIAN-LENS | BURGESS-OS 0.508G</title>
    <style>
        :root { --neon-blue: #0ff; --neon-alert: #f90; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        /* BURGESS-OS UI */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px); background-size: 40px 40px; }
        .os-header { position: absolute; top: 15px; left: 15px; color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); font-size: 14px; border-left: 2px solid var(--neon-blue); padding-left: 10px; }
        .os-stats { position: absolute; bottom: 15px; left: 15px; color: var(--neon-blue); font-size: 12px; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 255, 0.1); animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #turbidity-overlay { position: absolute; inset: 0; background: #3b2a1a; opacity: 0; pointer-events: none; transition: opacity 2s; z-index: 20; }
        #info-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(0, 20, 30, 0.9); border: 1px solid var(--neon-blue); color: #fff; padding: 20px; display: none; pointer-events: auto; backdrop-filter: blur(10px); }
        .close-btn { display: inline-block; margin-top: 15px; padding: 5px 10px; border: 1px solid var(--neon-blue); color: var(--neon-blue); cursor: pointer; }
    </style>
</head>
<body>
    <div id="turbidity-overlay"></div>
    <canvas id="renderCanvas"></canvas>
    <div id="ui-layer">
        <div class="scan-line"></div>
        <div class="os-header">BURGESS-OS v0.508G<br><span style="font-size: 10px; color: #aaa;">SYS.STATUS: ONLINE // BIOME: PURE ENGINE</span></div>
        <div class="os-stats">EVOLUTION: <span id="evo-lv">1.00</span><br>PREDATION SUCCESS: <span id="count">0</span></div>
    </div>
    <div id="info-panel">
        <h2 id="info-title">Species</h2>
        <p id="info-desc"></p>
        <div class="close-btn" onclick="document.getElementById('info-panel').style.display='none'">RESUME</div>
    </div>

    <script>
        /**
         * CAMBRIAN-LENS: PURE VANILLA ENGINE
         * 外部ライブラリを一切使わず、自作の3Dプロジェクションで描画する究極版
         */
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, evolution = 1.0, killCount = 0;
        let time = 0, isStriking = false;

        // 3Dを2Dに変換する魔法（プロジェクション）
        function project(x, y, z) {
            const focalLength = 400;
            const scale = focalLength / (focalLength + z + 200);
            return {
                x: width / 2 + x * scale,
                y: height / 2 + y * scale,
                scale: scale
            };
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 獲物（三葉虫）のデータ
        const trilobites = Array.from({length: 15}, () => ({
            x: Math.random() * 600 - 300,
            y: 150,
            z: Math.random() * 800 - 400,
            speed: 1 + Math.random() * 2,
            alive: true
        }));

        // 操作
        const strike = () => {
            isStriking = true;
            setTimeout(() => isStriking = false, 300);
        };
        window.addEventListener('mousedown', strike);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); strike(); }, {passive: false});

        function draw() {
            time += 0.03;
            ctx.fillStyle = '#000811';
            ctx.fillRect(0, 0, width, height);

            // 背景のマリンスノー
            ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
            for(let i=0; i<30; i++) {
                const px = (Math.sin(time * 0.2 + i) * 0.5 + 0.5) * width;
                const py = (i * 100 + time * 50) % height;
                ctx.fillRect(px, py, 2, 2);
            }

            // 三葉虫の描画と判定
            trilobites.forEach(t => {
                if(!t.alive) return;
                t.z -= t.speed;
                if(t.z < -400) t.z = 400;

                const p = project(t.x, t.y, t.z);
                ctx.fillStyle = `rgba(100, 100, 100, ${p.scale})`;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, 15 * p.scale, 10 * p.scale, 0, 0, Math.PI*2);
                ctx.fill();

                // 捕食判定
                if(isStriking && Math.abs(p.x - width/2) < 50 && Math.abs(p.y - height/2) < 50) {
                    t.alive = false;
                    killCount++;
                    evolution += 0.05;
                    document.getElementById('evo-lv').innerText = evolution.toFixed(2);
                    document.getElementById('count').innerText = killCount;
                    setTimeout(() => { t.alive = true; t.z = 400; }, 2000);
                }
            });

            // アノマロカリスの本体（14節の琥珀色セグメント）
            for(let i=14; i>=0; i--) {
                const sz = i * 30 - 100;
                const wave = Math.sin(time * 3 - i * 0.5) * 20;
                const strikeAmt = isStriking ? Math.sin(time * 10) * 50 : 0;
                
                const p = project(Math.sin(time) * 20, wave + strikeAmt, sz);
                const baseSize = (1 - i/14) * 80 * evolution * p.scale;

                // 琥珀色のグラデーション（内蔵シェーダー）
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, baseSize);
                const alpha = (0.5 + (1 - i/14) * 0.4) * p.scale;
                grad.addColorStop(0, `rgba(255, 180, 50, ${alpha})`); // 琥珀
                grad.addColorStop(1, `rgba(150, 70, 0, ${alpha * 0.2})`); // 縁

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, baseSize, baseSize * 0.5, Math.sin(time + i*0.1)*0.2, 0, Math.PI * 2);
                ctx.fill();

                // 目（複眼）
                if(i === 0) {
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.arc(p.x - 30 * p.scale, p.y - 20 * p.scale, 5 * p.scale, 0, Math.PI*2);
                    ctx.arc(p.x + 30 * p.scale, p.y - 20 * p.scale, 5 * p.scale, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(draw);
        }

        // 乱泥流イベント
        setInterval(() => {
            const ov = document.getElementById('turbidity-overlay');
            ov.style.opacity = 0.8;
            setTimeout(() => ov.style.opacity = 0, 3000);
        }, 20000);

        draw();
    </script>
</body>
</html>
